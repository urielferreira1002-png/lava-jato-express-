<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo — Lava Jato Express</title>
<style>
    <link rel="manifest" href="/manifest.json">
*{ margin:0; padding:0; box-sizing:border-box; }

body{
    font-family:'Segoe UI', sans-serif;
    background:#080808;
    color:#E8DCC4;
    padding:30px;
    min-height:100vh;
}

/* TOPO */
.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
    gap:20px;
    flex-wrap:wrap;
}

.topo-esq{
    display:flex;
    align-items:center;
    gap:15px;
}

.topo-esq img{
    width:50px;
    opacity:.9;
}

h1{
    color:#C8A97E;
    font-size:26px;
}

/* TABS */
.tabs{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:35px;
    border-bottom:1px solid rgba(200,169,126,.2);
    padding-bottom:5px;
}

.tab-btn{
    background:transparent;
    border:none;
    color:#888;
    padding:10px 20px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    border-radius:8px 8px 0 0;
    transition:.2s;
}

.tab-btn.ativo{
    color:#C8A97E;
    background:rgba(200,169,126,.1);
    border-bottom:2px solid #C8A97E;
}

.tab-btn:hover:not(.ativo){
    color:#E8DCC4;
}

/* SEÇÕES */
.secao{ display:none; }
.secao.ativa{ display:block; }

/* ESTATÍSTICAS */
.estatisticas{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:40px;
}

.box{
    background:#111;
    border-top:4px solid #C8A97E;
    padding:25px 20px;
    border-radius:15px;
    text-align:center;
}

.box-num{
    color:#C8A97E;
    font-size:40px;
    font-weight:700;
}

.box p{
    color:#888;
    margin-top:8px;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:.5px;
}

/* CARDS */
.card{
    background:#111;
    border-left:4px solid #C8A97E;
    padding:20px 25px;
    border-radius:12px;
    margin-bottom:15px;
    position:relative;
}

.card h3{
    color:#C8A97E;
    margin-bottom:10px;
    font-size:18px;
}

.card p{
    color:#E8DCC4;
    font-size:14px;
    margin:4px 0;
    line-height:1.6;
}

.card strong{
    color:#C8A97E;
}

.card-acoes{
    display:flex;
    gap:10px;
    margin-top:15px;
    flex-wrap:wrap;
}

/* BOTÕES */
button, .btn-acao{
    background:#C8A97E;
    color:#000;
    border:none;
    padding:9px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
    font-size:13px;
    transition:.2s;
}

button:hover, .btn-acao:hover{
    opacity:.85;
    transform:translateY(-1px);
}

.btn-excluir{
    background:#3a1010;
    color:#ff8080;
    border:1px solid #ff606060;
}

.btn-excluir:hover{
    background:#ff3030;
    color:#fff;
    border-color:transparent;
}

.btn-logout{
    background:#1a1a1a;
    color:#C8A97E;
    border:1px solid rgba(200,169,126,.3);
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
    transition:.2s;
}

.btn-logout:hover{
    background:rgba(200,169,126,.1);
}

/* H2 SEÇÕES */
h2{
    color:#C8A97E;
    margin:30px 0 20px;
    font-size:22px;
    display:flex;
    align-items:center;
    gap:10px;
}

h2::after{ display:none; }

/* GALERIA ADMIN */
#galeriaAdmin{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:20px;
}

.foto-admin{
    background:#111;
    border-radius:12px;
    overflow:hidden;
    border:1px solid rgba(200,169,126,.2);
}

.foto-admin img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.foto-admin button{
    width:100%;
    border-radius:0;
    background:#3a1010;
    color:#ff8080;
    border:none;
    padding:8px;
}

.foto-admin button:hover{
    background:#ff3030;
    color:#fff;
}

/* AGENDA */
.agenda-item{
    background:#111;
    border-left:4px solid #C8A97E;
    padding:15px 20px;
    border-radius:10px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:15px;
}

.agenda-hora{
    color:#C8A97E;
    font-size:22px;
    font-weight:700;
    min-width:55px;
}

.agenda-info p{ font-size:14px; color:#E8DCC4; }
.agenda-info strong{ color:#C8A97E; }

/* RANKING */
.ranking-item{
    display:flex;
    align-items:center;
    gap:15px;
    background:#111;
    padding:15px 20px;
    border-radius:12px;
    margin-bottom:12px;
}

.ranking-pos{
    font-size:28px;
    min-width:40px;
    text-align:center;
}

.ranking-info strong{
    color:#C8A97E;
    font-size:16px;
}

.ranking-info p{
    color:#888;
    font-size:13px;
    margin-top:3px;
}

.badge-gratis{
    margin-left:auto;
    background:rgba(200,169,126,.15);
    color:#C8A97E;
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:700;
}

/* INPUT FILE */
.upload-area{
    display:flex;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

input[type=file]{
    color:#E8DCC4;
    font-size:13px;
}

/* VAZIO */
.vazio{
    text-align:center;
    color:#555;
    padding:40px;
    font-size:16px;
}

/* FILTRO */
.filtros{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.filtros input,
.filtros select{
    background:#111;
    color:#E8DCC4;
    border:1px solid rgba(200,169,126,.25);
    padding:10px 15px;
    border-radius:8px;
    font-size:14px;
    outline:none;
}

.filtros input:focus,
.filtros select:focus{
    border-color:#C8A97E;
}

@media(max-width:600px){
    body{ padding:15px; }
    .box-num{ font-size:30px; }
    h1{ font-size:20px; }
}
</style>
</head>
<body>

<div class="topo">
    <div class="topo-esq">
        <img src="lava jato express.png" alt="Logo">
        <h1> Painel Lava Jato Express</h1>
    </div>
    <button class="btn-logout" onclick="logout()">🚪 Sair</button>
</div>

<!-- ESTATÍSTICAS -->
<div class="estatisticas">
    <div class="box">
        <div class="box-num" id="totalClientes">0</div>
        <p>Clientes</p>
    </div>
    <div class="box">
        <div class="box-num" id="totalAgendamentos">0</div>
        <p>Agendamentos</p>
    </div>
    <div class="box">
        <div class="box-num" id="faturamentoTotal">R$ 0</div>
        <p>Faturamento</p>
    </div>
    <div class="box">
        <div class="box-num" id="ticketMedio">R$ 0</div>
        <p>Ticket Médio</p>
    </div>
</div>

<!-- TABS -->
<div class="tabs">
    <button class="tab-btn ativo" onclick="abrirTab('agenda')">📅 Agenda do Dia</button>
    <button class="tab-btn" onclick="abrirTab('agendamentos')">📋 Agendamentos</button>
    <button class="tab-btn" onclick="abrirTab('fidelidade')">🏆 Fidelidade</button>
    <button class="tab-btn" onclick="abrirTab('galeria')">📸 Galeria</button>
</div>

<!-- TAB: AGENDA DO DIA -->
<div class="secao ativa" id="tab-agenda">
    <h2>📅 Agenda de Hoje</h2>
    <div id="agendaHoje"></div>
</div>

<!-- TAB: AGENDAMENTOS -->
<div class="secao" id="tab-agendamentos">
    <h2>📋 Todos os Agendamentos</h2>
    <div class="filtros">
        <input type="text" id="filtroNome" placeholder="🔍 Filtrar por nome ou placa..." oninput="renderAgendamentos()">
        <select id="filtroServico" onchange="renderAgendamentos()">
            <option value="">Todos os serviços</option>
            <option>Lavagem Simples</option>
            <option>Lavagem Completa</option>
            <option>Higienização</option>
            <option>Polimento</option>
        </select>
    </div>
    <div id="listaAgendamentos"></div>
</div>

<!-- TAB: FIDELIDADE -->
<div class="secao" id="tab-fidelidade">
    <h2>🏆 Clientes Fidelidade</h2>
    <div id="rankingClientes"></div>
</div>

<!-- TAB: GALERIA -->
<div class="secao" id="tab-galeria">
    <h2>📸 Galeria de Serviços</h2>
    <div class="upload-area">
        <input type="file" id="fotoUpload" accept="image/*" multiple>
        <button onclick="salvarFoto()">➕ Adicionar Foto(s)</button>
    </div>
    <div id="galeriaAdmin"></div>
</div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="admin.js"></script>
</body>
</html>
